name: Production Deployment

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ticket-backend:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ticket-frontend:latest
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}

      - name: Copy docker-compose, env and configs to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/app"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/app
            # Kill anything on port 80 to be sure
            fuser -k 80/tcp || true
            # Robust .env generation
            cat <<EOF > .env
DB_HOST='db'
DB_PORT='5432'
DB_USER='postgres'
DB_NAME='ticketing'
DB_PASSWORD='${{ secrets.DB_PASSWORD }}'
JWT_SECRET='${{ secrets.JWT_SECRET }}'
XENDIT_API_KEY='${{ secrets.XENDIT_API_KEY }}'
XENDIT_CALLBACK_TOKEN='${{ secrets.XENDIT_CALLBACK_TOKEN }}'
SMTP_HOST='${{ secrets.SMTP_HOST }}'
SMTP_PORT='${{ secrets.SMTP_PORT }}'
SMTP_USER='${{ secrets.SMTP_USER }}'
SMTP_PASS='${{ secrets.SMTP_PASS }}'
GOOGLE_CLIENT_ID='${{ secrets.GOOGLE_CLIENT_ID }}'
GOOGLE_CLIENT_SECRET='${{ secrets.GOOGLE_CLIENT_SECRET }}'
ALLOWED_ORIGINS='http://klixticket.com,https://klixticket.com,http://202.155.18.206'
EOF
            docker-compose down || true
            docker-compose pull
            docker-compose up -d
            docker image prune -f

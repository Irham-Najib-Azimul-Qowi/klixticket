version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_container
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ticketing
    volumes:
      - ./data/db:/var/lib/postgresql/data
    mem_limit: 300m
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  backend:
    image: irhamnajib/ticket-backend:latest
    container_name: backend_container
    restart: always
    depends_on:
      - db
    env_file: .env
    mem_limit: 256m
    ports:
      - "8080:8080"
    command: sh -c "sleep 5 && ./app migrate && ./app seed && ./app start"
    volumes:
      - ./uploads:/app/uploads

  frontend:
    image: irhamnajib/ticket-frontend:latest
    container_name: frontend_container
    restart: always
    ports:
      - "80:80"
    mem_limit: 128m

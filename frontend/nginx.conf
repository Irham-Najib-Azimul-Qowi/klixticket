worker_processes 1;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  sendfile      on;

  gzip on;
  gzip_types text/plain application/json application/javascript text/css;

  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

  server {
    listen 80;
    server_name klixticket.com www.klixticket.com;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Redirect all HTTP requests to HTTPS
    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name klixticket.com www.klixticket.com;

    ssl_certificate /etc/letsencrypt/live/klixticket.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/klixticket.com/privkey.pem;

    # Performance and security
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
      root /usr/share/nginx/html;
      try_files $uri /index.html;
      
      # Required for Google One Tap / GSI 
      add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
      add_header Cross-Origin-Embedder-Policy "unsafe-none" always;
    }

    location /api/ {
      limit_req zone=api_limit burst=10;

      proxy_pass http://backend_container:8080;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
      proxy_pass http://backend_container:8080;
    }
  }
}
